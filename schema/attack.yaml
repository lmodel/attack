    name: DataComponent
    definition_uri: https://w3id.org/lmodel/attack/DataComponent
    annotations:
      stix_type:
        tag: stix_type
        value: x-mitre-data-component
      attack_id_format:
        tag: attack_id_format
        value: DC####
    description: 'Data Components represent specific types of observable events or
      artifacts within a Data Source that can be collected to detect adversary technique
      execution. For example, ''Process Creation'' and ''Process Termination'' are
      data components within the ''Process'' data source.

      Data Components serve as the bridge between defensive telemetry and ATT&CK techniques.
      They detect techniques via ''detects'' relationship objects.

      The x_mitre_log_sources property (optional in Spec 3.x, required in Spec 4.x)
      provides platform-specific log collection configurations specifying exactly
      which log provider and event channel to monitor.

      The x_mitre_data_source_ref property establishing the parent data source link
      is DEPRECATED in ATT&CK Specification 3.3.0 and will be removed in 4.0.0.'
