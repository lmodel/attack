  Group:
    name: Group
    definition_uri: https://w3id.org/lmodel/attack/Group
    annotations:
      stix_type:
        tag: stix_type
        value: intrusion-set
      attack_id_format:
        tag: attack_id_format
        value: G####
    description: 'Groups represent clusters of adversary activity attributed to a
      common actor, sharing characteristics such as tools, tactics, techniques, infrastructure,
      or targeting. They may represent nation-state actors, criminal organizations,
      hacktivist collectives, or other tracked threat entities.

      Groups are implemented as standard STIX intrusion-set objects without additional
      ATT&CK-specific custom properties beyond the shared ATT&CK base fields. The
      aliases array provides alternative names; the first alias MUST match the group''s
      name property.

      Note: Several STIX Intrusion Set properties (goals, resource_level, primary_motivation,
      secondary_motivations, first_seen, last_seen) are inherited from STIX but are
      not actively used or populated in ATT&CK Group objects.'
    comments:
