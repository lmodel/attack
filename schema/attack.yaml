      green:
        text: green
        description: "TLP:GREEN \u2014 sharing within the broader community; not for\
          \ public release. Canonical ID: marking-definition--34098fce-860f-48ae-8e50-ebd3cc5e41da"
      amber:
        text: amber
        description: "TLP:AMBER \u2014 limited sharing on a need-to-know basis within\
          \ the recipient organization. Canonical ID: marking-definition--f88d31f6-486f-44da-b317-01333bde0b82"
      red:
        text: red
