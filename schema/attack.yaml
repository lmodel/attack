  Hex:
    name: Hex
    definition_uri: https://w3id.org/lmodel/stix/Hex
    description: 'The hex data type encodes an array of octets (8-bit bytes) as hexadecimal.
      The string MUST consist of an even number of hexadecimal characters, which are
      the digits ''0'' through ''9'' and the letters ''a'' through ''f''. In order
      to allow pattern matching on custom objects, all properties that use the hex
      type, the property name MUST end with ''_hex''. '
    comments:
    - 'jsonschema_type: string jsonschema_pattern: "^([a-fA-F0-9]{2})+$" jsonschema_source:
      https://github.com/oasis-open/cti-stix2-json-schemas/tree/master/schemas/common/hex.json'
    in_subset:
    - common
    from_schema: https://w3id.org/lmodel/stix
    is_a: CommonSchemaComponent
    slots:
    - id
    - type
    - name
    - description
    class_uri: stix:Hex
  Identifier:
    name: Identifier
