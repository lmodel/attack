classes:
  AttackKillChainPhase:
    name: AttackKillChainPhase
    definition_uri: https://w3id.org/lmodel/attack/AttackKillChainPhase
    description: 'An ATT&CK-constrained kill chain phase restricting kill_chain_name
      to the three ATT&CK domain identifiers: ''mitre-attack'', ''mitre-mobile-attack'',
      and ''mitre-ics-attack''. The phase_name must match the x_mitre_shortname of
      the associated x-mitre-tactic object in the same domain. Used in the kill_chain_phases
      property of Technique, Malware, and Tool objects to map them to their applicable
      tactic(s).'
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    is_a: KillChainPhase
    slots:
    - id
    - type
    - name
    - description
    - AttackKillChainPhase_kill_chain_name
    - AttackKillChainPhase_phase_name
    slot_usage:
      kill_chain_name:
        name: kill_chain_name
        description: The ATT&CK domain kill chain identifier. Must be one of 'mitre-attack',
          'mitre-mobile-attack', or 'mitre-ics-attack'.
        range: KillChainNameEnum
        required: true
      phase_name:
        name: phase_name
        description: The tactic short name corresponding to the x_mitre_shortname
          of the associated x-mitre-tactic object (e.g., 'initial-access', 'execution').
        required: true
    class_uri: attack:AttackKillChainPhase
  RelatedAsset:
    name: RelatedAsset
    definition_uri: https://w3id.org/lmodel/attack/RelatedAsset
    description: A sector-specific alias or variant name for a primary ATT&CK Asset
      object. Related assets capture how the same physical or logical device may be
      known by different names in different industrial contexts. For example, the
      primary asset 'Programmable Logic Controller (PLC)' may be called 'Field Controller'
      in the water treatment sector. Each related asset entry optionally scopes the
      alias to one or more industry sectors.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slots:
    - RelatedAsset_name
    - related_asset_sectors
    - RelatedAsset_description
    slot_usage:
      name:
        name: name
        description: Sector-specific name or alias used to identify this asset variant
          in a particular industrial context.
        required: true
      description:
        name: description
        description: Explanation of how this related asset variant relates to or differs
          from the primary asset definition.
        required: false
    class_uri: attack:RelatedAsset
  LogSource:
    name: LogSource
    definition_uri: https://w3id.org/lmodel/attack/LogSource
    description: A platform-specific log collection configuration embedded within
      a data component. Defines a specific log provider (name) and event category
      or channel identifier (channel) that together specify where to collect telemetry
      relevant to the parent data component's detection context. The (name, channel)
      pair must be unique within the x_mitre_log_sources array of a given data component.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slots:
    - LogSource_log_source_name
    - LogSource_log_source_channel
    slot_usage:
      log_source_name:
        name: log_source_name
        required: true
      log_source_channel:
        name: log_source_channel
        required: true
    class_uri: attack:LogSource
  LogSourceReference:
    name: LogSourceReference
    definition_uri: https://w3id.org/lmodel/attack/LogSourceReference
    description: A reference linking an analytic to a specific data component and
      log source pair. Specifies both the data component by STIX ID and the precise
      (name, channel) log source within that component that provides the raw data
      consumed by the analytic. Each (x_mitre_data_component_ref, name, channel) tuple
      must be unique within the x_mitre_log_source_references array of a given analytic.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slots:
    - LogSourceReference_x_mitre_data_component_ref
    - LogSourceReference_log_source_name
    - LogSourceReference_log_source_channel
    slot_usage:
      x_mitre_data_component_ref:
        name: x_mitre_data_component_ref
        required: true
      log_source_name:
        name: log_source_name
        required: true
      log_source_channel:
        name: log_source_channel
        required: true
    class_uri: attack:LogSourceReference
  MutableElement:
    name: MutableElement
    definition_uri: https://w3id.org/lmodel/attack/MutableElement
    description: An environment-tunable parameter within an ATT&CK analytic. Mutable
      elements identify specific fields in the detection logic that defenders can
      adjust to adapt the analytic to their operational environment without altering
      its fundamental detection behavior. For example, 'TimeWindow' could be tuned
      to match an organization's normal authentication patterns, or 'PortRange' adjusted
      to reflect monitored network segments.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slots:
    - MutableElement_mutable_field
    - MutableElement_description
    slot_usage:
      mutable_field:
        name: mutable_field
        required: true
      description:
        name: description
        description: Rationale for why this field is tunable and guidance for environment-specific
          configuration considerations.
        required: true
    class_uri: attack:MutableElement
  ObjectVersionReference:
    name: ObjectVersionReference
    definition_uri: https://w3id.org/lmodel/attack/ObjectVersionReference
    description: A versioned reference to a specific state of a STIX object, consisting
      of the object's STIX identifier paired with the exact modified timestamp of
      the version being referenced. Used in the x_mitre_contents property of Collection
      objects to designate the precise snapshot of each included object. The object_modified
      value must exactly match the corresponding object's modified property.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slots:
    - ObjectVersionReference_object_ref
    - ObjectVersionReference_object_modified
    slot_usage:
      object_ref:
        name: object_ref
        description: The STIX ID of the referenced ATT&CK object.
        required: true
      object_modified:
        name: object_modified
        description: The exact modified timestamp of the referenced object version.
          Must be a precise, millisecond-accurate match to the STIX object's modified
          property.
        required: true
    class_uri: attack:ObjectVersionReference
  TlpMarkingObject:
    name: TlpMarkingObject
    definition_uri: https://w3id.org/lmodel/attack/TlpMarkingObject
    description: The definition payload for a TLP (Traffic Light Protocol) marking
      definition. Contains a single tlp field carrying the TLP level value. Only instances
      corresponding to the four canonical ATT&CK TLP marking definitions are valid;
      new TLP marking objects must not be created.
    in_subset:
    - attack_smos
    from_schema: https://w3id.org/lmodel/attack
    slots:
    - TlpMarkingObject_tlp
    slot_usage:
      tlp:
        name: tlp
        required: true
    class_uri: attack:TlpMarkingObject
  StatementMarkingObject:
    name: StatementMarkingObject
    definition_uri: https://w3id.org/lmodel/attack/StatementMarkingObject
    description: The definition payload for a statement marking definition. Contains
      a single statement field with a copyright notice or terms-of-use text. ATT&CK
      uses this for its standard copyright statement applied to all distributed content.
    in_subset:
    - attack_smos
    from_schema: https://w3id.org/lmodel/attack
    slots:
    - StatementMarkingObject_statement
    slot_usage:
      statement:
        name: statement
        description: 'The full copyright or terms-of-use statement text. Example:
          "Copyright 2023, The MITRE Corporation. ATT&CK content is licensed under
          the Creative Commons Attribution 4.0 International (CC BY 4.0) license."'
        required: true
    class_uri: attack:StatementMarkingObject
  AttackObject:
    name: AttackObject
    definition_uri: https://w3id.org/lmodel/attack/AttackObject
    annotations:
      note:
        tag: note
        value: Corresponds to attackBaseDomainObjectSchema / attackBaseRelationshipObjectSchema
          in the ATT&CK Data Model TypeScript implementation. Relationship objects
          additionally omit 'name' and 'x_mitre_version'; see AttackRelationship for
          those constraints. MarkingDefinition additionally omits 'modified', 'x_mitre_attack_spec_version',
          'x_mitre_version', and 'x_mitre_deprecated'; see AttackMarkingDefinition.
    description: 'Abstract base class for all versioned ATT&CK objects (SDOs and SROs).
      Extends the STIX Core (Common Properties) object with ATT&CK-specific universal
      properties: the required x_mitre_attack_spec_version (which ATT&CK specification
      the object conforms to), x_mitre_version (the object''s content version), and
      optional x_mitre_deprecated and x_mitre_old_attack_id for lifecycle management.
      The name property inherited from StixEntity is required on all AttackObject
      subclasses (except Relationship, where it is not present).'
