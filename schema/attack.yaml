        required: true
        pattern: ^intrusion-set$
      id:
        name: id
        required: true
        pattern: ^intrusion-set--
      name:
        name: name
        description: The group's primary name as used in ATT&CK (e.g., 'APT28', 'FIN7',
          'Lazarus Group').
        required: true
      description:
        name: description
        description: A description of the group's known activity, targeting preferences,
          attributed campaigns, and distinguishing characteristics.
      external_references:
        name: external_references
        description: External references. The first entry MUST have source_name 'mitre-attack'
          and contain the group's ATT&CK ID as external_id (e.g., 'G0007').
