  Tactic:
    name: Tactic
    definition_uri: https://w3id.org/lmodel/attack/Tactic
    annotations:
      stix_type:
        tag: stix_type
        value: x-mitre-tactic
      attack_id_format:
        tag: attack_id_format
        value: TA####
    description: "Tactics represent the adversary's high-level strategic objectives\
      \ during an attack \u2014 the \"why\" behind individual techniques. Tactics\
      \ form the columns of the ATT&CK matrix and organize techniques into coherent\
      \ operational categories.\nTactics are implemented as x-mitre-tactic custom\
      \ STIX objects that extend the STIX Domain Object pattern. They are specific\
      \ to ATT&CK and not defined by the core STIX 2.1 specification.\nThe x_mitre_shortname\
      \ property is the machine-readable tactic identifier used to link techniques:\
      \ a technique's kill_chain_phases entry uses x_mitre_shortname as phase_name\
      \ when kill_chain_name matches the appropriate ATT&CK domain value."
