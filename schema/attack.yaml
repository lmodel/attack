          it accomplishes, and typically includes examples of observed adversary behavior
          and platform considerations.
      external_references:
        name: external_references
        description: External references for this technique. The first entry MUST
          have source_name 'mitre-attack' with the ATT&CK ID as external_id (e.g.,
          'T1059' or 'T1059.001'). Additional entries may reference reports, malware
          analyses, or other sources.
        comments:
