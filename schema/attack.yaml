    description: Indicates whether this technique can be used for availability attacks,
      integrity attacks, or both. Only applicable to techniques in the Enterprise
      ATT&CK Impact tactic. A technique with 'Availability' affects the availability
      of systems or data; 'Integrity' indicates unauthorized modification of data
      or configuration.
    comments:
    - 'jsonschema_minItems: "1"'
    in_subset:
    - enterprise_only
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_impact_type
    owner: Technique
    domain_of:
    - Technique
    range: AttackImpactTypeEnum
    multivalued: true
  x_mitre_network_requirements:
    name: x_mitre_network_requirements
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_network_requirements
    description: Boolean indicating whether this technique requires network connectivity
      as a precondition for execution. When true, the adversary must have network
      access to the target environment for the technique to be applicable.
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_network_requirements
    owner: Technique
    domain_of:
    - Technique
    range: boolean
  x_mitre_tactic_type:
    name: x_mitre_tactic_type
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_tactic_type
    description: Indicates the adversary's device access model for Mobile ATT&CK techniques.
      Specifies whether the technique requires post-device-access, pre-device-access,
      or no device access at all. Only used in the Mobile ATT&CK domain.
    comments:
    - 'jsonschema_minItems: "1"'
    in_subset:
    - mobile_only
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_tactic_type
    owner: Technique
    domain_of:
    - Technique
    range: AttackTacticTypeEnum
    multivalued: true
  x_mitre_shortname:
    name: x_mitre_shortname
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_shortname
    description: 'The machine-readable short identifier for an ATT&CK tactic. Used
      to map techniques to their associated tactic: a technique''s kill_chain_phases
      entry uses this value as its phase_name when the kill_chain_name matches the
      tactic''s domain. For example, the ''Initial Access'' tactic has x_mitre_shortname
      ''initial-access''. Must be unique across all tactics within a domain.'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_shortname
    owner: Tactic
    domain_of:
    - Tactic
    range: AttackTacticShortNameEnum
    required: true
  x_mitre_first_seen_citation:
    name: x_mitre_first_seen_citation
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_first_seen_citation
    description: 'One or more inline citation references documenting the original
      sources that established when this campaign was first observed. Each citation
      references a source_name from the object''s external_references array. Multiple
      citations are concatenated without separators: ''(Citation: Source1)(Citation:
      Source2)''. This property is required on all Campaign objects.'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_first_seen_citation
    owner: AttackCampaign
    domain_of:
    - AttackCampaign
    range: citation_string
    required: true
  x_mitre_last_seen_citation:
    name: x_mitre_last_seen_citation
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_last_seen_citation
    description: 'One or more inline citation references documenting the original
      sources that established when this campaign was last observed. Each citation
      references a source_name from the object''s external_references array. Multiple
      citations are concatenated without separators: ''(Citation: Source1)(Citation:
      Source2)''. This property is required on all Campaign objects.'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_last_seen_citation
    owner: AttackCampaign
    domain_of:
    - AttackCampaign
    range: citation_string
    required: true
  x_mitre_aliases:
    name: x_mitre_aliases
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_aliases
    description: ATT&CK-recognized alternative names or aliases for this software
      object (Malware or Tool). The first alias in the array MUST match the object's
      name property. This is the preferred alias field for ATT&CK software objects,
      distinct from the STIX-standard 'aliases' property which is present but not
      actively maintained in ATT&CK software objects.
    comments:
    - 'jsonschema_minItems: "1" validator_hint: first-alias-must-match-name'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_aliases
    owner: AttackTool
    domain_of:
    - AttackMalware
    - AttackTool
    range: string
    multivalued: true
  x_mitre_sectors:
    name: x_mitre_sectors
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_sectors
    description: The industry sectors in which this ICS Asset is commonly observed
      or deployed. Provides context for which operational environments the asset appears
      in. Only applicable in the ICS ATT&CK domain. At least one sector must be specified
      when this property is present.
    comments:
    - 'jsonschema_minItems: "1"'
    in_subset:
    - ics_only
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_sectors
    owner: Asset
    domain_of:
    - Asset
    range: AttackAssetSectorEnum
    multivalued: true
  x_mitre_related_assets:
    name: x_mitre_related_assets
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_related_assets
    description: Sector-specific aliases and related device types associated with
      this primary asset definition. Related assets describe how the same physical
      or logical asset may be named or categorized differently across industrial sectors
      (e.g., a 'Programmable Logic Controller' in manufacturing may be called a 'Field
      Controller' in water treatment). Each related asset entry may include sector
      scoping.
    comments:
    - 'jsonschema_minItems: "1"'
    in_subset:
    - ics_only
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_related_assets
    owner: Asset
    domain_of:
    - Asset
    range: RelatedAsset
    multivalued: true
    inlined: true
    inlined_as_list: true
  x_mitre_collection_layers:
    name: x_mitre_collection_layers
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_collection_layers
    description: The technology stack layers from which telemetry for this Data Source
      can be collected. Indicates where in the environment defenders should look to
      obtain the raw data this source provides. At least one collection layer must
      be specified.
    comments:
    - 'jsonschema_minItems: "1"'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_collection_layers
    owner: DataSource
    domain_of:
    - DataSource
    range: AttackCollectionLayerEnum
    required: true
    multivalued: true
  x_mitre_data_source_ref:
    name: x_mitre_data_source_ref
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_data_source_ref
    description: DEPRECATED in ATT&CK Specification v3.3.0. Will be removed in v4.0.0.
      The STIX ID of the parent x-mitre-data-source object that this data component
      belongs to. Establishes the hierarchical source-to-component relationship. Superseded
      by explicit 'detects' relationships from DetectionStrategy objects.
    deprecated: Deprecated in ATT&CK Specification v3.3.0; superseded by DetectionStrategy
      'detects' relationships. Will be removed in v4.0.0.
    in_subset:
    - deprecated
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_data_source_ref
    owner: DataComponent
    domain_of:
    - DataComponent
    range: stix_identifier
    pattern: ^x-mitre-data-source--
  x_mitre_log_sources:
    name: x_mitre_log_sources
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_log_sources
    description: Platform-specific log collection configurations for this data component.
      Each entry specifies a log source provider name and a channel/event type identifier
      that together pinpoint where to collect relevant telemetry. Each (name, channel)
      pair must be unique within the array. This property is optional in ATT&CK Specification
      3.x but will become required in ATT&CK Specification 4.x.
    comments:
    - 'jsonschema_minItems: "1" validator_hint: no-duplicate-name-channel-pairs'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_log_sources
    owner: DataComponent
    domain_of:
    - DataComponent
    range: LogSource
    multivalued: true
    inlined: true
    inlined_as_list: true
  tactic_refs:
    name: tactic_refs
    definition_uri: https://w3id.org/lmodel/attack/tactic_refs
    description: An ordered list of STIX IDs referencing x-mitre-tactic objects that
      constitute this ATT&CK matrix. The order of entries in this array determines
      the left-to-right display order of tactics in the ATT&CK matrix visualization.
      At least one tactic reference is required.
    comments:
    - 'jsonschema_minItems: "1"'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:tactic_refs
    owner: Matrix
    domain_of:
    - Matrix
    range: stix_identifier
    required: true
    multivalued: true
    pattern: ^x-mitre-tactic--
  x_mitre_contents:
    name: x_mitre_contents
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_contents
    description: An ordered list of versioned object references specifying the exact
      version of each STIX object included in this ATT&CK collection. Each entry pairs
      a STIX object ID with the precise modified timestamp of the version being referenced,
      allowing consumers to reconstruct the exact state of the knowledge base at any
      given release. All referenced IDs must be present in the distributing bundle's
      objects array.
    comments:
    - 'jsonschema_minItems: "1" validator_hint: validate-x-mitre-contents-cross-references'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_contents
    owner: Collection
    domain_of:
    - Collection
    range: ObjectVersionReference
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true
  x_mitre_analytic_refs:
    name: x_mitre_analytic_refs
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_analytic_refs
    description: An ordered array of STIX IDs referencing x-mitre-analytic objects
      that implement this detection strategy. Each referenced analytic provides platform-specific
      detection logic for one platform. References must be unique; no duplicate analytic
      IDs are permitted. At least one analytic is required.
    comments:
    - 'jsonschema_minItems: "1" validator_hint: no-duplicate-analytic-refs'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_analytic_refs
    owner: DetectionStrategy
    domain_of:
    - DetectionStrategy
    range: stix_identifier
    required: true
    multivalued: true
    pattern: ^x-mitre-analytic--
  x_mitre_log_source_references:
    name: x_mitre_log_source_references
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_log_source_references
    description: A list of log source references that link this analytic to specific
      data components and their associated log sources. Each reference identifies
      a data component by STIX ID and specifies the (name, channel) pair of the log
      source within that component to target. Each (x_mitre_data_component_ref, name,
      channel) tuple must be unique within the array.
    comments:
    - 'jsonschema_minItems: "1" validator_hint: no-duplicate-log-source-reference-tuples'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_log_source_references
    owner: Analytic
    domain_of:
    - Analytic
    range: LogSourceReference
    multivalued: true
    inlined: true
    inlined_as_list: true
  x_mitre_mutable_elements:
    name: x_mitre_mutable_elements
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_mutable_elements
    description: Environment-tunable parameters within this analytic that defenders
      can adjust to adapt the detection logic to their specific environment without
      altering its fundamental detection behavior. Examples include time windows,
      user context filters, or port ranges. Each element names a tunable field and
      explains the rationale for tunability.
    comments:
    - 'jsonschema_minItems: "1"'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_mutable_elements
    owner: Analytic
    domain_of:
    - Analytic
    range: MutableElement
    multivalued: true
    inlined: true
    inlined_as_list: true
  related_asset_sectors:
    name: related_asset_sectors
    definition_uri: https://w3id.org/lmodel/attack/related_asset_sectors
    description: The industry sectors in which this related (aliased) asset variant
      is observed under the given name. Provides sector-specific scoping for the alias
      entry, indicating which industries use this naming convention for the asset.
    comments:
    - 'jsonschema_minItems: "1"'
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:related_asset_sectors
    owner: RelatedAsset
    domain_of:
    - RelatedAsset
    range: AttackAssetSectorEnum
    multivalued: true
  log_source_name:
    name: log_source_name
    definition_uri: https://w3id.org/lmodel/attack/log_source_name
    description: The log source provider or service name (e.g., 'sysmon', 'auditd',
      'unified_logs', 'windows_security'). Together with log_source_channel, uniquely
      identifies a specific log collection configuration.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:log_source_name
    owner: LogSourceReference
    domain_of:
    - LogSource
    - LogSourceReference
    range: string
    required: true
  log_source_channel:
    name: log_source_channel
    definition_uri: https://w3id.org/lmodel/attack/log_source_channel
    description: The specific log channel, event ID, or event category within the
      log source (e.g., '1' for Sysmon Process Creation event, 'SYSCALL' for Linux
      auditd, 'process' for macOS unified logs). Together with log_source_name, uniquely
      identifies a log collection configuration.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:log_source_channel
    owner: LogSourceReference
    domain_of:
    - LogSource
    - LogSourceReference
    range: string
    required: true
  x_mitre_data_component_ref:
    name: x_mitre_data_component_ref
    definition_uri: https://w3id.org/lmodel/attack/x_mitre_data_component_ref
    description: The STIX ID of the x-mitre-data-component object that this log source
      reference is associated with. Links the analytic's required data collection
      to a specific data component's log source definition.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:x_mitre_data_component_ref
    owner: LogSourceReference
    domain_of:
    - LogSourceReference
    range: stix_identifier
    required: true
    pattern: ^x-mitre-data-component--
  mutable_field:
    name: mutable_field
    definition_uri: https://w3id.org/lmodel/attack/mutable_field
    description: The name of the analytic field or parameter that can be tuned by
      a defender to adapt it to their environment (e.g., 'TimeWindow', 'UserContext',
      'PortRange', 'SubnetFilter'). Provides a clear identifier for the tunable aspect
      of the analytic.
    in_subset:
    - attack_aux
    from_schema: https://w3id.org/lmodel/attack
    slot_uri: attack:mutable_field
    owner: MutableElement
    domain_of:
    - MutableElement
    range: string
    required: true
  tlp:
    name: tlp
    definition_uri: https://w3id.org/lmodel/attack/tlp
    description: 'The Traffic Light Protocol level assigned by this TLP marking definition.
      Must be one of the four standard TLP values: ''white'', ''green'', ''amber'',
      ''red''. Each TLP level carries distinct sharing semantics governing how marked
      content may be further distributed by recipients.'
