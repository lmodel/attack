name: attack
annotations:
  attack_spec_version:
    tag: attack_spec_version
    value: 3.3.0
  stix_version:
    tag: stix_version
    value: '2.1'
description: "MITRE ATT&CK\xAE: LinkML Schema\nThe ATT&CK knowledge base is modeled\
  \ using the ATT&CK Data Model (ADM), a STIX 2.1-based\nschema expressing adversary\
  \ tactics, techniques, procedures (TTPs) and related objects.\nThis schema imports\
  \ the STIX 2.1 LinkML schema and adds ATT&CK-specific classes, slots,\nenumerations,\
  \ and constraints."
title: ATT&CK
source: https://mitre-attack.github.io/attack-data-model/schemas/
see_also:
- https://lmodel.github.io/attack
- https://github.com/mitre-attack/attack-data-model
- https://attack.mitre.org
id: https://w3id.org/lmodel/attack
imports:
- linkml:types
- ./stix
license: Apache-2.0
prefixes:
  attack:
    prefix_prefix: attack
    prefix_reference: https://w3id.org/lmodel/attack/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  PATO:
    prefix_prefix: PATO
    prefix_reference: http://purl.obolibrary.org/obo/PATO_
  stix:
    prefix_prefix: stix
    prefix_reference: https://w3id.org/lmodel/stix/
  spdx:
    prefix_prefix: spdx
    prefix_reference: https://lmodel.github.io/spdx/
  oscal:
    prefix_prefix: oscal
    prefix_reference: https://lmodel.github.io/oscal/
  capex:
    prefix_prefix: capex
    prefix_reference: https://lmodel.github.io/capex/
  unified_cyber_ontology:
    prefix_prefix: unified_cyber_ontology
    prefix_reference: https://w3id.org/lmodel/uco-master/
default_prefix: attack
default_range: string
subsets:
  attack_sdos:
    name: attack_sdos
    definition_uri: https://w3id.org/lmodel/attack/AttackSdos
    description: "ATT&CK STIX Domain Objects (SDOs) \u2014 the primary objects representing\
      \ tactics, techniques, groups, campaigns, software, mitigations, assets, data\
      \ sources, data components, matrices, collections, analytics, detection strategies,\
      \ and identity."
    from_schema: https://w3id.org/lmodel/attack
  attack_sros:
    name: attack_sros
    definition_uri: https://w3id.org/lmodel/attack/AttackSros
    description: "ATT&CK STIX Relationship Objects (SROs) \u2014 relationship objects\
      \ connecting ATT&CK SDOs with typed semantic relationships (uses, mitigates,\
      \ subtechnique-of, detects, etc.)."
    from_schema: https://w3id.org/lmodel/attack
  attack_smos:
    name: attack_smos
    definition_uri: https://w3id.org/lmodel/attack/AttackSmos
    description: "ATT&CK STIX Meta Objects (SMOs) \u2014 non-versioned metadata objects\
      \ such as TLP and statement marking definitions."
    from_schema: https://w3id.org/lmodel/attack
  attack_bundle:
    name: attack_bundle
    definition_uri: https://w3id.org/lmodel/attack/AttackBundle
    description: "ATT&CK STIX Bundle \u2014 the top-level distribution container for\
      \ an ATT&CK domain dataset. Not a STIX Object; distributes exactly one x-mitre-collection\
      \ plus all referenced objects."
    from_schema: https://w3id.org/lmodel/attack
  attack_aux:
    name: attack_aux
    definition_uri: https://w3id.org/lmodel/attack/AttackAux
    description: Auxiliary helper classes used as inlined component types within ATT&CK
      objects (e.g., RelatedAsset, LogSource, LogSourceReference, MutableElement,
      ObjectVersionReference).
    from_schema: https://w3id.org/lmodel/attack
  deprecated:
    name: deprecated
    definition_uri: https://w3id.org/lmodel/attack/Deprecated
    description: Slots and classes marked as deprecated in the ATT&CK Data Model.
      Properties in this subset are present for backward compatibility and are scheduled
      for removal in ATT&CK Specification 4.0.0.
    from_schema: https://w3id.org/lmodel/attack
  enterprise_only:
    name: enterprise_only
    definition_uri: https://w3id.org/lmodel/attack/EnterpriseOnly
    description: Properties and values applicable only within the Enterprise ATT&CK
      domain.
    from_schema: https://w3id.org/lmodel/attack
  mobile_only:
    name: mobile_only
    definition_uri: https://w3id.org/lmodel/attack/MobileOnly
    description: Properties and values applicable only within the Mobile ATT&CK domain.
    from_schema: https://w3id.org/lmodel/attack
  ics_only:
    name: ics_only
    definition_uri: https://w3id.org/lmodel/attack/IcsOnly
    description: Properties and values applicable only within the ICS (Industrial
      Control Systems) ATT&CK domain.
    from_schema: https://w3id.org/lmodel/attack
  common:
    name: common
    definition_uri: https://w3id.org/lmodel/stix/Common
    description: Classes from stix/schemas/common/*.json
    from_schema: https://w3id.org/lmodel/stix
  observables:
    name: observables
    definition_uri: https://w3id.org/lmodel/stix/Observables
    description: Classes from stix/schemas/observables/*.json
    from_schema: https://w3id.org/lmodel/stix
  sdos:
    name: sdos
    definition_uri: https://w3id.org/lmodel/stix/Sdos
    description: Classes from stix/schemas/sdos/*.json
    from_schema: https://w3id.org/lmodel/stix
  sros:
    name: sros
    definition_uri: https://w3id.org/lmodel/stix/Sros
    description: Classes from stix/schemas/sros/*.json
    from_schema: https://w3id.org/lmodel/stix
types:
  attack_version_string:
    name: attack_version_string
    definition_uri: https://w3id.org/lmodel/attack/AttackVersionString
    description: An ATT&CK object version string in 'major.minor' format where both
      components are integers between 0 and 99 (e.g., "1.0", "12.5"). The version
      is incremented by ATT&CK when the content of an object changes. Does not include
      a patch component.
    from_schema: https://w3id.org/lmodel/attack
    base: str
    uri: xsd:string
    pattern: ^(\d{1,2})\.(\d{1,2})$
  semver_string:
    name: semver_string
    definition_uri: https://w3id.org/lmodel/attack/SemverString
    description: 'A semantic version string in MAJOR.MINOR.PATCH format as per https://semver.org/.
      Used by x_mitre_attack_spec_version to identify which version of the ATT&CK
      Data Model specification an object conforms to. Example: "3.0.0", "2.1.0".'
    from_schema: https://w3id.org/lmodel/attack
    base: str
    uri: xsd:string
    pattern: ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$
  citation_string:
    name: citation_string
    definition_uri: https://w3id.org/lmodel/attack/CitationString
    description: 'One or more inline citation references concatenated without any
      separator, each in the form ''(Citation: source_name)''. Used on Campaign objects
      to cite sources for when a campaign was first or last seen. Each source_name
      reference must resolve to a source_name value in the object''s external_references
      array. Example: "(Citation: FireEye APT28)(Citation: MSTIC HAFNIUM)"'
    from_schema: https://w3id.org/lmodel/attack
    base: str
    uri: xsd:string
    pattern: ^(\(Citation:[^)]+\))+$
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  stix_identifier:
    name: stix_identifier
    definition_uri: https://w3id.org/lmodel/stix/StixIdentifier
    from_schema: https://w3id.org/lmodel/stix
    base: str
    uri: xsd:string
    pattern: ^[a-z][a-z0-9-]*--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
  stix_type_name:
    name: stix_type_name
    definition_uri: https://w3id.org/lmodel/stix/StixTypeName
    from_schema: https://w3id.org/lmodel/stix
    base: str
    uri: xsd:string
    pattern: ^([a-z][a-z0-9]*)+(-[a-z0-9]+)*-?$
enums:
  AttackDomainEnum:
    name: AttackDomainEnum
    definition_uri: https://w3id.org/lmodel/attack/AttackDomainEnum
    description: Closed enumeration of the three ATT&CK technology domains. ATT&CK
      is organized into domains that represent the ecosystems adversaries operate
      within. All ATT&CK objects that carry x_mitre_domains must reference at least
      one of these domains.
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      enterprise-attack:
        text: enterprise-attack
        description: Enterprise domain covering Windows, Linux, macOS, cloud platforms
          (IaaS, SaaS, Office 365, Google Workspace, Azure AD), containers, network
          devices, and PRE.
      mobile-attack:
        text: mobile-attack
        description: Mobile domain covering Android and iOS operating systems. Techniques
          describe adversary behavior targeting mobile devices.
      ics-attack:
        text: ics-attack
        description: ICS (Industrial Control Systems) domain covering Operational
          Technology environments including SCADA, DCS, PLCs, RTUs, and other OT components.
  AttackPlatformEnum:
    name: AttackPlatformEnum
    definition_uri: https://w3id.org/lmodel/attack/AttackPlatformEnum
    description: Closed enumeration of all technology platforms supported across ATT&CK
      domains. Platforms represent specific operating environments or technology stacks
      within which adversary techniques are applicable. Values must be unique within
      any x_mitre_platforms array; duplicates are not permitted.
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      Windows:
        text: Windows
        description: Microsoft Windows desktop and server operating systems.
      Linux:
        text: Linux
        description: Linux-based operating systems (all distributions).
      macOS:
        text: macOS
        description: Apple macOS operating system.
      Android:
        text: Android
        description: Google Android mobile operating system.
      iOS:
        text: iOS
        description: Apple iOS and iPadOS mobile operating systems.
      Azure AD:
        text: Azure AD
        description: "Microsoft Azure Active Directory \u2014 cloud identity and access\
          \ management."
      Google Workspace:
        text: Google Workspace
        description: Google Workspace productivity suite (formerly G Suite), including
          Gmail, Drive, etc.
      Office Suite:
        text: Office Suite
        description: Office productivity suites (Microsoft 365, etc.).
      SaaS:
        text: SaaS
        description: Software-as-a-Service cloud applications accessible via a web
          browser.
      IaaS:
        text: IaaS
        description: Infrastructure-as-a-Service cloud platforms (AWS, Azure, GCP
          compute, storage, etc.).
      Containers:
        text: Containers
        description: Container runtimes and orchestration platforms (Docker, Kubernetes,
          etc.).
      ESXi:
        text: ESXi
        description: VMware ESXi hypervisor platform.
      Identity Provider:
        text: Identity Provider
        description: Identity and Access Management (IAM) provider systems.
      Network Devices:
        text: Network Devices
        description: Network infrastructure devices such as routers, switches, and
          firewalls.
      PRE:
        text: PRE
        description: Pre-compromise activities such as reconnaissance and resource
          development.
      None:
        text: None
        description: No specific platform dependency; technique applies generically.
      Field Controller/RTU/PLC/IED:
        text: Field Controller/RTU/PLC/IED
        description: ICS field controllers, Remote Terminal Units (RTUs), Programmable
          Logic Controllers (PLCs), and Intelligent Electronic Devices (IEDs).
      Data Historian:
        text: Data Historian
        description: ICS data historian systems that record and store process data
          over time.
      Engineering Workstation:
        text: Engineering Workstation
        description: ICS engineering workstations used to program and configure field
          devices.
      Control Server:
        text: Control Server
        description: ICS supervisory control servers including SCADA and DCS master
          stations.
      Human-Machine Interface:
        text: Human-Machine Interface
        description: ICS HMI systems providing operator visualization and control
          interfaces.
      Input/Output Server:
        text: Input/Output Server
        description: ICS Input/Output servers that interface between control networks
          and field devices.
      Safety Instrumented System/Protection Relay:
        text: Safety Instrumented System/Protection Relay
        description: ICS safety systems including Safety Instrumented Systems (SIS)
          and protection relays.
      Embedded:
        text: Embedded
        description: Embedded systems and firmware environments in specialized hardware.
  KillChainNameEnum:
    name: KillChainNameEnum
    definition_uri: https://w3id.org/lmodel/attack/KillChainNameEnum
    description: Closed enumeration of ATT&CK kill chain identifiers used in kill_chain_phases.
      These three values correspond to the three ATT&CK domains and are used to map
      techniques to their associated tactics. The phase_name in each kill_chain_phase
      must match the x_mitre_shortname of the corresponding x-mitre-tactic object.
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      mitre-attack:
        text: mitre-attack
        description: Enterprise ATT&CK kill chain (used in the enterprise-attack domain).
      mitre-mobile-attack:
        text: mitre-mobile-attack
        description: Mobile ATT&CK kill chain (used in the mobile-attack domain).
      mitre-ics-attack:
        text: mitre-ics-attack
        description: ICS ATT&CK kill chain (used in the ics-attack domain).
  AttackTacticShortNameEnum:
    name: AttackTacticShortNameEnum
    definition_uri: https://w3id.org/lmodel/attack/AttackTacticShortNameEnum
    description: Closed enumeration of all ATT&CK tactic short names (x_mitre_shortname).
      Short names use lowercase hyphen-separated words and are used as the kill_chain_phases.phase_name
      value by techniques belonging to a tactic. This enumeration covers short names
      across all three ATT&CK domains (Enterprise, Mobile, ICS). Some short names
      appear in multiple domains.
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      reconnaissance:
        text: reconnaissance
        description: 'Enterprise: Adversaries gather information to plan future operations.'
      resource-development:
        text: resource-development
        description: 'Enterprise: Adversaries establish resources to support operations.'
      initial-access:
        text: initial-access
        description: 'Enterprise / Mobile / ICS: Adversaries gain a foothold in the
          environment.'
      execution:
        text: execution
        description: 'Enterprise / Mobile / ICS: Adversaries run malicious code.'
      persistence:
        text: persistence
        description: 'Enterprise / Mobile / ICS: Adversaries maintain their foothold.'
      privilege-escalation:
        text: privilege-escalation
        description: 'Enterprise / Mobile / ICS: Adversaries gain higher-level permissions.'
      defense-evasion:
        text: defense-evasion
        description: 'Enterprise / Mobile: Adversaries avoid being detected.'
      credential-access:
        text: credential-access
        description: 'Enterprise / Mobile: Adversaries steal account names and passwords.'
      discovery:
        text: discovery
        description: 'Enterprise / Mobile / ICS: Adversaries figure out the environment.'
      lateral-movement:
        text: lateral-movement
        description: 'Enterprise / Mobile / ICS: Adversaries move through the environment.'
      collection:
        text: collection
        description: 'Enterprise / Mobile / ICS: Adversaries gather data of interest.'
      command-and-control:
        text: command-and-control
        description: 'Enterprise / Mobile / ICS: Adversaries communicate with compromised
          systems.'
      exfiltration:
        text: exfiltration
        description: 'Enterprise / Mobile: Adversaries steal data.'
      impact:
        text: impact
        description: 'Enterprise / Mobile / ICS: Adversaries manipulate, interrupt,
          or destroy systems and data.'
      evasion:
        text: evasion
        description: 'Mobile: Adversaries evade analysis and defenses on mobile platforms.'
      network-effects:
        text: network-effects
        description: 'Mobile (legacy): Adversaries intercept or manipulate network
          traffic.'
      remote-service-effects:
        text: remote-service-effects
        description: 'Mobile (legacy): Adversaries control or monitor remote services
          on mobile devices.'
      inhibit-response-function:
        text: inhibit-response-function
        description: 'ICS: Adversaries prevent safety mechanisms from responding to
          events.'
      impair-process-control:
        text: impair-process-control
        description: 'ICS: Adversaries manipulate physical control processes.'
  AttackRelationshipTypeEnum:
    name: AttackRelationshipTypeEnum
    definition_uri: https://w3id.org/lmodel/attack/AttackRelationshipTypeEnum
    description: Closed enumeration of relationship types used in ATT&CK relationship
      objects. Each value defines a specific semantic connection between ATT&CK STIX
      objects. Not all (source, relationship, target) type combinations are valid;
      see the ATT&CK Data Model specification for the full relationship compatibility
      matrix.
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      uses:
        text: uses
        description: 'A Group (intrusion-set), Campaign, Malware, or Tool uses a Technique
          (attack-pattern), Malware, or Tool. Constraint: Malware CANNOT use Malware;
          Tool CANNOT use Tool. Campaign --uses--> Technique/Malware/Tool is also
          valid.'
      mitigates:
        text: mitigates
        description: 'A Mitigation (course-of-action) mitigates a Technique (attack-pattern).
          Only valid source type: course-of-action. Only valid target type: attack-pattern.'
      subtechnique-of:
        text: subtechnique-of
        description: A sub-technique (attack-pattern) is a specialized implementation
          of a parent technique (attack-pattern). Source is the sub-technique; target
          is the parent. Each sub-technique has exactly one parent; parent techniques
          may have many sub-techniques.
      detects:
        text: detects
        description: 'A DataComponent (x-mitre-data-component) or DetectionStrategy
          (x-mitre-detection-strategy) detects a Technique (attack-pattern). Note:
          x-mitre-data-component --detects--> attack-pattern is DEPRECATED as of v3.3.0.'
      attributed-to:
        text: attributed-to
        description: A Campaign is attributed to a Group (intrusion-set). Represents
          the intelligence assessment linking a campaign to a known threat actor group.
      targets:
        text: targets
        description: A Technique (attack-pattern) targets an Asset (x-mitre-asset).
          Only applicable in the ICS domain to model technique-to-asset targeting
          relationships.
      revoked-by:
        text: revoked-by
        description: An ATT&CK object has been revoked and replaced by another object
          of the same STIX type. Both source and target must be the same STIX type
          (e.g., both attack-pattern).
  AttackEffectivePermissionsEnum:
    name: AttackEffectivePermissionsEnum
    definition_uri: https://w3id.org/lmodel/attack/AttackEffectivePermissionsEnum
    description: DEPRECATED in ATT&CK Specification v3.3.0. Will be removed in v4.0.0.
      Closed enumeration of the effective Windows or Unix permission levels that an
      adversary achieves after successfully exploiting a technique. Only four values
      are recognized.
    deprecated: Deprecated in ATT&CK Specification v3.3.0; will be removed in v4.0.0.
    in_subset:
    - deprecated
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      Administrator:
        text: Administrator
        description: Windows Administrator-level permissions (local or domain admin).
      SYSTEM:
        text: SYSTEM
        description: "Windows SYSTEM account privileges \u2014 highest built-in Windows\
          \ privilege level."
      User:
        text: User
        description: Standard unprivileged user-level permissions.
      root:
        text: root
        description: Unix/Linux root (superuser) privileges.
  AttackImpactTypeEnum:
    name: AttackImpactTypeEnum
    definition_uri: https://w3id.org/lmodel/attack/AttackImpactTypeEnum
    description: Closed enumeration of impact type categories applicable to techniques
      in the Enterprise ATT&CK Impact tactic. Indicates whether the technique can
      be used to affect system availability, data integrity, or both.
    in_subset:
    - enterprise_only
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      Availability:
        text: Availability
        description: The technique can be used to impact system or service availability
          (e.g., denial-of-service, ransomware data encryption, destructive malware).
      Integrity:
        text: Integrity
        description: The technique can be used to impact data or system integrity
          (e.g., unauthorized data modification, firmware compromise, log tampering).
  AttackPermissionsRequiredEnum:
    name: AttackPermissionsRequiredEnum
    definition_uri: https://w3id.org/lmodel/attack/AttackPermissionsRequiredEnum
    description: DEPRECATED in ATT&CK Specification v3.3.0. Will be removed in v4.0.0.
      Closed enumeration of the minimum permission level required for an adversary
      to execute the technique on a target system.
    deprecated: Deprecated in ATT&CK Specification v3.3.0; will be removed in v4.0.0.
    in_subset:
    - deprecated
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      Remote Desktop Users:
        text: Remote Desktop Users
        description: Membership in the Remote Desktop Users group is required.
      SYSTEM:
        text: SYSTEM
        description: SYSTEM account context is required.
      Administrator:
        text: Administrator
        description: Local or domain Administrator privilege is required.
      root:
        text: root
        description: Unix/Linux root (superuser) privilege is required.
      User:
        text: User
        description: Standard (non-privileged) user access is sufficient.
  AttackTacticTypeEnum:
    name: AttackTacticTypeEnum
    definition_uri: https://w3id.org/lmodel/attack/AttackTacticTypeEnum
    description: Closed enumeration of tactic types for Mobile ATT&CK techniques (x_mitre_tactic_type).
      Indicates the adversary's device access model for executing the technique. Only
      used in the Mobile ATT&CK domain.
    in_subset:
    - mobile_only
    from_schema: https://w3id.org/lmodel/attack
    permissible_values:
      Post-Adversary Device Access:
        text: Post-Adversary Device Access
        description: The technique is executed after the adversary has gained access
          to the device.
      Pre-Adversary Device Access:
        text: Pre-Adversary Device Access
        description: The technique is performed before the adversary gains access
          to the device.
      Without Adversary Device Access:
        text: Without Adversary Device Access
        description: The technique does not require the adversary to have direct device
          access.
