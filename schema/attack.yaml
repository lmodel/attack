  Mitigation:
    name: Mitigation
    definition_uri: https://w3id.org/lmodel/attack/Mitigation
    annotations:
      stix_type:
        tag: stix_type
        value: course-of-action
      attack_id_format:
        tag: attack_id_format
        value: M####
    description: "Mitigations describe defensive measures, security controls, and\
      \ configuration changes that can prevent or reduce the effectiveness of adversary\
      \ techniques. Mitigations are implemented as STIX course-of-action objects.\n\
      Historical note \u2014 Legacy 1:1 Mitigations: Prior to ATT&CK v5 (July 2019),\
      \ mitigations had a 1:1 relationship with techniques and shared their ATT&CK\
      \ IDs. This design was deprecated to support the current many-to-many model\
      \ where one mitigation can address multiple techniques. Legacy 1:1 mitigation\
      \ objects may cause ATT&CK ID collisions and can be filtered by their deprecated\
      \ or revoked status."
