    description: "Tools represent legitimate software programs that adversaries may\
      \ abuse or repurpose to accomplish their attack objectives. Unlike Malware,\
      \ tools are not inherently malicious \u2014 they serve legitimate purposes but\
      \ can be weaponized by adversaries (e.g., Cobalt Strike, Mimikatz, PsExec, Metasploit).\n\
      Together with Malware objects, Tools form the ATT&CK 'Software' category and\
      \ share the same ATT&CK ID format (S####). Both are linked to Groups and Techniques\
      \ via 'uses' relationships.\nThe x_mitre_aliases field holds ATT&CK-recognized\
      \ alternative names; the first alias MUST match the object's name. The STIX\
      \ 'aliases' property is not actively maintained in ATT&CK Tool objects.\nNote:\
      \ STIX Tool properties (tool_types, kill_chain_phases, tool_version, aliases)\
      \ are available from the STIX specification but not actively used in ATT&CK\
      \ Tool objects."
