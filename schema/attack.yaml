      contact_information:
        name: contact_information
        description: STIX contact information. Available from the STIX specification
          but not actively used in ATT&CK Identity objects.
    class_uri: attack:AttackIdentity
  DetectionStrategy:
    name: DetectionStrategy
    definition_uri: https://w3id.org/lmodel/attack/DetectionStrategy
    annotations:
      stix_type:
        tag: stix_type
        value: x-mitre-detection-strategy
      attack_id_format:
        tag: attack_id_format
        value: DET####
    description: 'Detection Strategies define high-level, platform-agnostic approaches
      for detecting specific adversary techniques. They function as containers organizing
      one or more platform-specific Analytics (x-mitre-analytic objects) into cohesive
      detection methodologies, describing what data to collect and what behavioral
      patterns to look for.

      Detection Strategies were introduced in ATT&CK Specification 3.3.0 as part of
      the new detection framework, superseding the deprecated x-mitre-data-source
      and x-mitre-data-component approach for technique detection.

      A Detection Strategy links to its implementing analytics via x_mitre_analytic_refs.
      Analytics in turn link back to data components via x_mitre_log_source_references,
      creating a complete detection chain from technique to observable log event.'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    is_a: AttackObject
    slots:
    - description
    - Core_labels
    - revoked
    - confidence
    - lang
    - Core_granular_markings
    - extensions
    - AttackObject_x_mitre_attack_spec_version
    - AttackObject_x_mitre_version
    - x_mitre_deprecated
    - x_mitre_old_attack_id
    - AttackObject_spec_version
    - AttackObject_created
    - AttackObject_modified
    - DetectionStrategy_x_mitre_domains
    - DetectionStrategy_x_mitre_modified_by_ref
    - DetectionStrategy_x_mitre_contributors
    - DetectionStrategy_x_mitre_analytic_refs
    - DetectionStrategy_type
    - DetectionStrategy_id
    - DetectionStrategy_name
    - DetectionStrategy_external_references
    - DetectionStrategy_created_by_ref
    - DetectionStrategy_object_marking_refs
    slot_usage:
      type:
        name: type
        required: true
        pattern: ^x-mitre-detection-strategy$
      id:
        name: id
        required: true
        pattern: ^x-mitre-detection-strategy--
      name:
        name: name
        description: The name of the detection strategy describing the overall detection
          approach.
        required: true
      external_references:
        name: external_references
        description: External references. The first entry MUST contain the detection
          strategy's ATT&CK ID as external_id (e.g., 'DET0001').
        comments:
        - 'jsonschema_minItems: "1"'
        required: true
      created_by_ref:
        name: created_by_ref
        required: true
      object_marking_refs:
        name: object_marking_refs
        required: true
      x_mitre_domains:
        name: x_mitre_domains
        required: true
      x_mitre_modified_by_ref:
        name: x_mitre_modified_by_ref
        required: true
      x_mitre_contributors:
        name: x_mitre_contributors
        description: People and organizations who contributed to this detection strategy.
          At least one contributor is required on DetectionStrategy objects.
        comments:
        - 'jsonschema_minItems: "1"'
        required: true
      x_mitre_analytic_refs:
        name: x_mitre_analytic_refs
        description: STIX IDs of x-mitre-analytic objects implementing this strategy.
          Each analytic provides platform-specific detection logic. At least one analytic
          reference is required; references must be unique.
        required: true
    class_uri: attack:DetectionStrategy
  Analytic:
    name: Analytic
    definition_uri: https://w3id.org/lmodel/attack/Analytic
    annotations:
      stix_type:
        tag: stix_type
        value: x-mitre-analytic
      attack_id_format:
        tag: attack_id_format
        value: AN####
    description: "Analytics contain the concrete, platform-specific detection logic\
      \ implementing a Detection Strategy for a specific operating environment. An\
      \ analytic specifies the exact log data sources to query (via x_mitre_log_source_references),\
      \ the detection logic or query pattern, and optionally defines tunable parameters\
      \ (x_mitre_mutable_elements) allowing defenders to adapt it to their environment.\n\
      Each analytic targets exactly one platform (x_mitre_platforms maximum cardinality\
      \ is 1). Multiple analytics may implement the same detection strategy, one per\
      \ supported platform.\nThe detection chain is:\n  DetectionStrategy (x_mitre_analytic_refs\
      \ \u2192)\n    Analytic (x_mitre_log_source_references \u2192)\n      DataComponent\
      \ (log_source name/channel \u2192)\n        detects \u2192\n          Technique"
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    is_a: AttackObject
    slots:
    - Core_labels
    - revoked
    - confidence
    - lang
    - Core_granular_markings
    - extensions
    - AttackObject_x_mitre_attack_spec_version
    - AttackObject_x_mitre_version
    - x_mitre_deprecated
    - x_mitre_old_attack_id
    - AttackObject_spec_version
    - AttackObject_created
    - AttackObject_modified
    - Analytic_x_mitre_domains
    - Analytic_x_mitre_platforms
    - x_mitre_modified_by_ref
    - x_mitre_log_source_references
    - x_mitre_mutable_elements
    - Analytic_type
    - Analytic_id
    - Analytic_name
    - Analytic_description
    - Analytic_external_references
    - Analytic_created_by_ref
    - Analytic_object_marking_refs
    slot_usage:
      type:
        name: type
        required: true
        pattern: ^x-mitre-analytic$
      id:
        name: id
        required: true
        pattern: ^x-mitre-analytic--
      name:
        name: name
        description: The name of this analytic.
        required: true
      description:
        name: description
        description: A description of this analytic, including what it detects, how
          it works, and any important behavioral or environmental context.
        required: true
      external_references:
        name: external_references
        description: External references. The first entry MUST contain the analytic's
          ATT&CK ID as external_id (e.g., 'AN0001').
        comments:
        - 'jsonschema_minItems: "1"'
        required: true
      created_by_ref:
        name: created_by_ref
        required: true
      object_marking_refs:
        name: object_marking_refs
        required: true
      x_mitre_platforms:
        name: x_mitre_platforms
        description: The single target platform for this analytic. Maximum cardinality
          is 1; each analytic targets exactly one platform.
        comments:
        - 'jsonschema_maxItems: "1"'
      x_mitre_domains:
        name: x_mitre_domains
        required: true
    class_uri: attack:Analytic
  AttackRelationship:
    name: AttackRelationship
    definition_uri: https://w3id.org/lmodel/attack/AttackRelationship
    annotations:
      stix_type:
        tag: stix_type
        value: relationship
    description: "ATT&CK Relationship objects connect ATT&CK STIX objects using typed\
      \ semantic relationships. ATT&CK restricts STIX relationship semantics to a\
      \ closed set of relationship_type values and enforces valid (source_type, relationship_type,\
      \ target_type) combinations.\nValid relationship combinations:\n  uses:\n  \
      \  malware | tool | intrusion-set | campaign  \u2192  attack-pattern | malware\
      \ | tool\n    (malware\u2192malware and tool\u2192tool combinations are explicitly\
      \ prohibited)\n  mitigates:\n    course-of-action  \u2192  attack-pattern\n\
      \  subtechnique-of:\n    attack-pattern  \u2192  attack-pattern  (source=sub-technique,\
      \ target=parent)\n  detects:\n    x-mitre-data-component | x-mitre-detection-strategy\
      \  \u2192  attack-pattern\n    (x-mitre-data-component\u2192attack-pattern DEPRECATED\
      \ as of Spec 3.3.0)\n  attributed-to:\n    campaign  \u2192  intrusion-set\n\
      \  targets:\n    attack-pattern  \u2192  x-mitre-asset\n  revoked-by:\n    <any>\
      \ \u2192 <same STIX type>  (source and target must be the same type)\n\nATT&CK\
      \ Relationship objects do not carry a 'name' property or 'x_mitre_version'.\
      \ The x_mitre_modified_by_ref is required on all ATT&CK relationships."
    comments:
    - 'validator_hint: validate-attack-relationship-source-target-type-compatibility'
    in_subset:
    - attack_sros
    from_schema: https://w3id.org/lmodel/attack
    is_a: AttackObject
    slots:
    - Core_labels
    - revoked
    - confidence
    - lang
    - Core_external_references
    - Core_object_marking_refs
    - Core_granular_markings
    - extensions
    - AttackObject_x_mitre_attack_spec_version
    - x_mitre_deprecated
    - x_mitre_old_attack_id
    - AttackObject_spec_version
    - AttackObject_created
    - AttackObject_modified
    - AttackObject_created_by_ref
    - AttackRelationship_x_mitre_modified_by_ref
    - AttackRelationship_type
    - AttackRelationship_id
    - AttackRelationship_relationship_type
    - AttackRelationship_source_ref
    - AttackRelationship_target_ref
    - AttackRelationship_description
    - AttackRelationship_name
    - AttackRelationship_x_mitre_version
    slot_usage:
      type:
        name: type
        required: true
        pattern: ^relationship$
      id:
        name: id
        required: true
        pattern: ^relationship--
      relationship_type:
        name: relationship_type
        description: The semantic type of this relationship. Must be one of the seven
          ATT&CK relationship types.
        range: AttackRelationshipTypeEnum
        required: true
      source_ref:
        name: source_ref
        description: The STIX ID of the source object. The STIX type prefix must be
          compatible with the relationship_type and target_ref type.
        required: true
      target_ref:
        name: target_ref
        description: The STIX ID of the target object. The STIX type prefix must be
          compatible with the relationship_type and source_ref type.
        required: true
      description:
        name: description
        description: Optional human-readable description providing context about this
          specific relationship instance.
      x_mitre_modified_by_ref:
        name: x_mitre_modified_by_ref
        required: true
      name:
        name: name
        description: Not present on ATT&CK Relationship objects. Inherited from the
          base STIX specification but omitted in ATT&CK's use of relationship objects.
        required: false
      x_mitre_version:
        name: x_mitre_version
        description: Not present on ATT&CK Relationship objects. Version tracking
          is not applied to relationship objects in the ATT&CK Data Model.
        required: false
    class_uri: attack:AttackRelationship
  AttackMarkingDefinition:
    name: AttackMarkingDefinition
    definition_uri: https://w3id.org/lmodel/attack/AttackMarkingDefinition
    annotations:
      stix_type:
        tag: stix_type
        value: marking-definition
    description: "ATT&CK Marking Definition objects apply data handling constraints\
      \ to ATT&CK content. ATT&CK uses two categories of marking definitions:\n1.\
      \ TLP (Traffic Light Protocol) markings \u2014 four canonical instances with\
      \ fixed IDs:\n     TLP:WHITE  \u2192 marking-definition--613f2e26-407d-48c7-9eca-b8e91df99dc9\n\
      \     TLP:GREEN  \u2192 marking-definition--34098fce-860f-48ae-8e50-ebd3cc5e41da\n\
      \     TLP:AMBER  \u2192 marking-definition--f88d31f6-486f-44da-b317-01333bde0b82\n\
      \     TLP:RED    \u2192 marking-definition--5e57c739-391a-4eb3-b6be-7d15ca92d5ed\n\
      \n2. Statement markings \u2014 copyright and terms-of-use text applied to ATT&CK\
      \ content.\n     Example: \"Copyright 2023, The MITRE Corporation. ATT&CK\xAE\
      \ is a registered trademark.\"\n\nMarking Definition objects are STIX Meta Objects\
      \ (SMOs). They do NOT have a 'modified' property and do NOT carry ATT&CK versioning\
      \ fields (x_mitre_attack_spec_version, x_mitre_version, x_mitre_deprecated).\n\
      The canonical TLP marking definition instances MUST NOT be recreated; only the\
      \ four fixed instances listed above are valid TLP markings for ATT&CK content."
    comments:
    - 'validator_hint: enforce-marking-definition-tlp-statement-branches note: TLP
      marking definition IDs are fixed constants; do not create new TLP instances.'
    in_subset:
    - attack_smos
    from_schema: https://w3id.org/lmodel/attack
    is_a: MarkingDefinition
    slots:
    - description
    - MarkingDefinition_external_references
    - MarkingDefinition_object_marking_refs
    - MarkingDefinition_granular_markings
    - extensions
    - statement
    - AttackMarkingDefinition_type
    - AttackMarkingDefinition_id
    - AttackMarkingDefinition_spec_version
    - AttackMarkingDefinition_created
    - AttackMarkingDefinition_created_by_ref
    - AttackMarkingDefinition_definition_type
    - AttackMarkingDefinition_definition
    - AttackMarkingDefinition_name
    - AttackMarkingDefinition_x_mitre_attack_spec_version
    - AttackMarkingDefinition_x_mitre_version
    - AttackMarkingDefinition_x_mitre_deprecated
    slot_usage:
      type:
        name: type
        required: true
        pattern: ^marking-definition$
      id:
        name: id
        required: true
        pattern: ^marking-definition--
      spec_version:
        name: spec_version
        required: true
      created:
        name: created
        required: true
      created_by_ref:
        name: created_by_ref
        description: The STIX ID of the identity that created this marking definition.
          ATT&CK marking definitions reference MITRE's identity.
        required: true
      definition_type:
        name: definition_type
        description: 'The type of marking definition payload: ''tlp'' for Traffic
          Light Protocol markings, or ''statement'' for copyright/terms-of-use text.'
        range: MarkingDefinitionTypeEnum
        required: true
      definition:
        name: definition
        description: The marking definition payload object. For TLP markings this
          is a TlpMarkingObject containing the tlp level. For statement markings this
          is a StatementMarkingObject containing the statement text.
        required: true
      name:
        name: name
        description: Human-readable name for TLP marking definitions (e.g., 'TLP:WHITE',
          'TLP:GREEN'). Listed in the STIX 2.1 specification; optional in ATT&CK practice.
      x_mitre_attack_spec_version:
        name: x_mitre_attack_spec_version
        description: Not present on ATT&CK Marking Definition objects (SMOs are unversioned).
        required: false
      x_mitre_version:
        name: x_mitre_version
        description: Not present on ATT&CK Marking Definition objects.
        required: false
      x_mitre_deprecated:
        name: x_mitre_deprecated
        description: Not present on ATT&CK Marking Definition objects.
        required: false
    class_uri: attack:AttackMarkingDefinition
  AttackBundle:
    name: AttackBundle
    definition_uri: https://w3id.org/lmodel/attack/AttackBundle
    annotations:
      stix_type:
        tag: stix_type
        value: bundle
    description: "An ATT&CK STIX Bundle is the top-level distribution container for\
      \ an ATT&CK domain dataset. ATT&CK publishes one bundle per domain per release:\n\
      \  - enterprise-attack  (Enterprise ATT&CK)\n  - mobile-attack      (Mobile\
      \ ATT&CK)\n  - ics-attack         (ATT&CK for ICS)\n\nA Bundle is NOT a STIX\
      \ Object \u2014 it has no ATT&CK-specific versioning fields, no created_by_ref,\
      \ and no marking definitions of its own. It serves purely as a JSON container\
      \ grouping all objects that constitute a release.\nATT&CK Bundle structural\
      \ requirements:\n  1. The bundle MUST contain exactly one x-mitre-collection\
      \ object.\n  2. The x-mitre-collection MUST be the first object in the 'objects'\
      \ array.\n  3. All STIX IDs referenced in the collection's x_mitre_contents\
      \ MUST be\n     present in the bundle's 'objects' array (no dangling references).\n\
      \  4. No duplicate STIX IDs are permitted within a bundle's objects array.\n\
      \nNote: A STIX Bundle Object is not a STIX Object (Section 7.1, STIX 2.1 spec).\
      \ Objects within the bundle are not semantically related by virtue of sharing\
      \ a container; all relationships are expressed via Relationship SRO objects."
    in_subset:
    - attack_bundle
    from_schema: https://w3id.org/lmodel/attack
    is_a: Bundle
    slots:
    - name
    - description
    - AttackBundle_type
    - AttackBundle_id
    - AttackBundle_bundle_objects
    slot_usage:
      type:
        name: type
        description: Must be the literal string 'bundle'.
        required: true
        pattern: ^bundle$
      id:
        name: id
        description: 'The STIX identifier for this bundle. Follows the standard STIX
          identifier format: bundle--<UUIDv4>.'
        required: true
        pattern: ^bundle--
      bundle_objects:
        name: bundle_objects
        description: The ATT&CK STIX objects contained in this bundle. The first object
          MUST be an x-mitre-collection object. All STIX IDs referenced in the collection's
          x_mitre_contents must appear as objects in this array.
        comments:
        - 'jsonschema_minItems: "1" validator_hint: validate-attack-bundle-first-object-is-collection
          validator_hint: validate-attack-bundle-contents-cross-references validator_hint:
          no-duplicate-stix-ids-in-bundle'
        required: true
    class_uri: attack:AttackBundle
