        name: created_by_ref
        description: The STIX ID of the identity object that first created this ATT&CK
          object. Typically references MITRE's identity (identity--c78cb6e5-0c4b-4611-8297-d1b8b55e40b5).
    class_uri: attack:AttackObject
  AttackSoftware:
    name: AttackSoftware
    definition_uri: https://w3id.org/lmodel/attack/AttackSoftware
    annotations:
      note:
        tag: note
        value: 'Software is a union type in the ATT&CK Data Model (softwareSchema
          = malwareSchema | toolSchema). This abstract class captures the shared properties.
          Use Malware or Tool for concrete objects. ATT&CK ID format: S####'
    description: 'Abstract superclass for ATT&CK Software objects, representing both
      Malware and Tool STIX types. Software in ATT&CK encompasses all programs used
      by adversaries to accomplish their objectives. Both Malware and Tool share the
      ATT&CK ID format S#### and the same set of ATT&CK-specific properties (x_mitre_aliases,
      x_mitre_platforms, x_mitre_domains, etc.). Concrete subclasses: Malware (stix
      type ''malware'') and Tool (stix type ''tool'').'
    notes:
