  AttackMalware:
    name: AttackMalware
    definition_uri: https://w3id.org/lmodel/attack/AttackMalware
    annotations:
      stix_type:
        tag: stix_type
        value: malware
      attack_id_format:
        tag: attack_id_format
        value: S####
    description: 'Malware represents malicious software programs that adversaries
      use to accomplish their operational objectives, such as data exfiltration, persistent
      access, lateral movement, or destructive impact. ATT&CK tracks both malware
      families (is_family: true) and specific malware instances or samples (is_family:
      false).

      Together with Tool objects, Malware forms the ATT&CK ''Software'' category.
      Both share the ATT&CK ID format S#### and are often linked to Groups and Techniques
      via ''uses'' relationships.

      The x_mitre_aliases field holds ATT&CK-recognized alternative names; the first
      alias MUST match the object''s name. The STIX ''aliases'' property is defined
      in the STIX specification but is not actively maintained in ATT&CK Malware objects.

      Note: Several STIX Malware properties (malware_types, kill_chain_phases, first_seen,
      last_seen, architecture_execution_envs, implementation_languages, capabilities)
      are available from the STIX specification but not actively used in ATT&CK.'
    notes:
    - The class name 'attack:Software' collides with (is_a) 'stix:Software', so renamed.
    - The class name 'attack:Malware' collides with 'stix:Malware', so renamed.
    comments:
    - 'validator_hint: first-x-mitre-alias-or-alias-must-match-name'
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
