  Technique:
    name: Technique
    definition_uri: https://w3id.org/lmodel/attack/Technique
    annotations:
      stix_type:
        tag: stix_type
        value: attack-pattern
      attack_id_format:
        tag: attack_id_format
        value: T#### (technique) or T####.### (sub-technique)
    description: "Techniques describe the specific methods adversaries use to achieve\
      \ tactical objectives. They are implemented as STIX attack-pattern objects and\
      \ represent the \"how\" of adversary behavior \u2014 the concrete actions taken\
      \ to accomplish a tactic.\nA Technique may be a top-level technique (x_mitre_is_subtechnique:\
      \ false) or a sub-technique (x_mitre_is_subtechnique: true). Sub-techniques\
      \ provide more granular detail about specific implementations of their parent\
      \ technique.\nSub-technique constraints:\n  - ATT&CK ID format: T####.### where\
      \ T#### is the parent's ID\n  - Connected to parent via 'subtechnique-of' relationship\
      \ (source = sub, target = parent)\n  - Each sub-technique has exactly one parent;\
      \ parents may have many sub-techniques\n  - Sub-techniques inherit all parent\
      \ tactics; platforms must be a subset of parent's\n\nTactics mapping: kill_chain_phases\
      \ entries use the tactic's x_mitre_shortname as phase_name, with kill_chain_name\
      \ set to the appropriate ATT&CK domain value."
    in_subset:
    - attack_sdos
    from_schema: https://w3id.org/lmodel/attack
    is_a: AttackObject
    slots:
    - Core_labels
    - revoked
    - confidence
    - lang
    - Core_object_marking_refs
    - Core_granular_markings
