// metamodel_version: 1.7.0
// Specifies properties of an NTFS alternate data stream.
message AlternateDataStreamType
 {
  stixIdentifier id = 0
  stixTypeName type = 0
  string name = 0
  string description = 0
  string adsName = 0
  integer adsSize = 0
  hashesType adsHashes = 0
 }
// Analytics contain the concrete, platform-specific detection logic implementing a Detection Strategy for a specific operating environment. An analytic specifies the exact log data sources to query (via x_mitre_log_source_references), the detection logic or query pattern, and optionally defines tunable parameters (x_mitre_mutable_elements) allowing defenders to adapt it to their environment.
// Each analytic targets exactly one platform (x_mitre_platforms maximum cardinality is 1). Multiple analytics may implement the same detection strategy, one per supported platform.
// The detection chain is:
//   DetectionStrategy (x_mitre_analytic_refs →)
//     Analytic (x_mitre_log_source_references →)
//       DataComponent (log_source name/channel →)
//         detects →
//           Technique
message Analytic
 {
 repeated  string labels = 0
  boolean revoked = 0
  integer confidence = 0
  string lang = 0
 repeated  granularMarking granularMarkings = 0
 repeated  string extensions = 0
  semverString xMitreAttackSpecVersion = 0
  attackVersionString xMitreVersion = 0
  boolean xMitreDeprecated = 0
  string xMitreOldAttackId = 0
  specVersionEnum specVersion = 0
  datetime created = 0
  datetime modified = 0
 repeated  attackDomainEnum xMitreDomains = 0
 repeated  attackPlatformEnum xMitrePlatforms = 0
  stixIdentifier xMitreModifiedByRef = 0
 repeated  logSourceReference xMitreLogSourceReferences = 0
 repeated  mutableElement xMitreMutableElements = 0
  stixTypeName type = 0
  stixIdentifier id = 0
  string name = 0
  string description = 0
 repeated  externalReference externalReferences = 0
  stixIdentifier createdByRef = 0
 repeated  stixIdentifier objectMarkingRefs = 0
 }
